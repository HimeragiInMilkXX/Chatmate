server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/easyprofile_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

sa-token:
  token-name: satoken
  is-read-header: true
  is-read-cookie: true
  is-log: true

authlib:
  cors:
    allowed-origins:
      - http://localhost:3000
  avatar:
    upload-dir: ./uploads/avatars
    base-url: /uploads/avatars
    max-size-bytes: 5242880
  reset-password:
    cooldown-days: 7
  token-timeout: 604800
  security:
    require-old-password-on-reset: true

demo:
  cors:
    allowed-origins:
      - http://localhost:3000
